<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Portfólio - Contato</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Cabeçalho e Menu de Navegação Global -->
    <header>
        <div class="logo">
            <h1>Meu Portfólio</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Sobre Mim</a></li>
                <li><a href="formacao.html">Formação</a></li>
                <li><a href="portfolio.html">Portfólio</a></li>
                <li><a href="contato.html" class="active">Contato</a></li>
            </ul>
        </nav>
    </header>

    <!-- Conteúdo Principal da Página -->
    <main>
        <section class="contato-section">
            <h2>Contato</h2>
            <p style="margin-bottom: 1.5rem;">Entre em contato comigo preenchendo o formulário abaixo ou através das minhas redes profissionais.</p>
            
            <div class="container-contato">
                <!-- Formulário de Contato exigido pelo modelo -->
                <form class="form-contato" action="#" method="POST" onsubmit="alert('Mensagem enviada com sucesso! (Simulação)'); return false;">
                    <div class="grupo-campo">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" name="nome" required placeholder="Digite seu nome completo">
                    </div>
                    
                    <div class="grupo-campo">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com">
                    </div>
                    
                    <div class="grupo-campo">
                        <label for="mensagem">Mensagem:</label>
                        <textarea id="mensagem" name="mensagem" rows="5" required placeholder="Escreva sua mensagem aqui..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn-enviar">Enviar Mensagem</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Rodapé Global -->
    <footer>
        <p>&copy; 2026 - Desenvolvido para a Atividade Prática Uninter</p>
    </footer>

</body>
</html>
</body>
</html>
